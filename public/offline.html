<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sin conexion</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0b1116;
        color: #e6eef4;
        font-family: "Segoe UI", sans-serif;
      }
      .card {
        width: min(92vw, 420px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        background: #16222b;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
      }
      p {
        margin: 0;
        color: #9fb1bd;
        font-size: 14px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Sin conexion</h1>
      <p>Revisa tu internet y vuelve a intentar. Algunas vistas recientes pueden seguir disponibles offline.</p>
    </main>
  </body>
</html>
